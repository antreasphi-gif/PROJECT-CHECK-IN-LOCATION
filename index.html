<!DOCTYPE html>
<html>
<head>
  <title>Location Check</title>
</head>
<body>

<h2>Check-in Required</h2>
<p id="status">Checking your location... - you have to turn on your location - πρέπει να ενεργοποιήσεις την τοποθεσία σου</p>

<script>
const targetLat = 35.16269;   
const targetLng = 33.36081;
const radius = 500; // meters

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;

  const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
            Math.cos(φ1) * Math.cos(φ2) *
            Math.sin(Δλ/2) * Math.sin(Δλ/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}

navigator.geolocation.getCurrentPosition(function(position) {

  const userLat = position.coords.latitude;
  const userLng = position.coords.longitude;

  const distance = getDistance(userLat, userLng, targetLat, targetLng);

  if (distance <= radius) {
    document.getElementById("status").innerHTML =
      "Access granted! Redirecting...";

    window.location.href = "https://t.me/+71tWomd1wZ1jMzhk";

  } else {
    document.getElementById("status").innerHTML =
      "You are not in the required location - δεν είναι στην απαιτούμενη τοποθεσία.";
  }

});
</script>

</body>
</html>
